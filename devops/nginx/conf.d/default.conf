server {
    listen 80;
    server_name localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Health check endpoint (no rate limiting)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker network
        deny all;
    }

    # ==================== Health / Ping ====================
    location = /ping {
        set $ingest_upstream http://ingest-service:8080;
        proxy_pass $ingest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # ==================== Application Routes ====================
    # /*/uploads/* → ingest-service  (e.g. /v1/uploads/multipart/init)
    location ~ ^/[^/]+/uploads(/|$) {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        set $ingest_upstream http://ingest-service:8080;
        proxy_pass $ingest_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        add_header X-Upstream-Server $upstream_addr always;
    }

    # /*/movies/* → query-service  (e.g. /v1/movies, /v1/movies/:id)
    location ~ ^/[^/]+/movies(/|$) {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        set $query_upstream http://query-service:8080;
        proxy_pass $query_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        add_header X-Upstream-Server $upstream_addr always;
    }

    # ==================== Root ====================
    location / {
        return 200 '{"status":"ok"}\n';
        add_header Content-Type application/json;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"Too many requests","message":"Rate limit exceeded. Please try again later."}\n';
        add_header Content-Type application/json always;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        add_header Content-Type application/json always;
        return 503 '{"error":"Upstream error","message":"Service temporarily unavailable"}\n';
    }
}
