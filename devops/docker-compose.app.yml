# Application Services
# Scale instances at runtime:
#   docker compose up -d --scale ingest-service=3 --scale query-service=3

services:
  ingest-service:
    build:
      context: ../ingest-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongo-primary:27017,mongo-secondary-1:27017,mongo-secondary-2:27017/csv_ingestor?replicaSet=rs0&authSource=admin
      - PORT=8080
      - OTEL_EXPORTER_URL=http://signoz-otel-collector:${OTEL_HTTP_PORT:-4318}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    depends_on:
      mongo-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  query-service:
    build:
      context: ../query-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongo-primary:27017,mongo-secondary-1:27017,mongo-secondary-2:27017/csv_ingestor?replicaSet=rs0&authSource=admin
      - PORT=8080
      - OTEL_EXPORTER_URL=http://signoz-otel-collector:${OTEL_HTTP_PORT:-4318}
    depends_on:
      mongo-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
