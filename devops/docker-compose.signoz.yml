# SigNoz Observability Stack
# Includes ClickHouse, Query Service, OTel Collector, and Frontend

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.11-alpine
    container_name: clickhouse
    ports:
      - "${CLICKHOUSE_PORT:-9000}:9000"
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-signoz}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-signoz}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-signoz123}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config/listen-host.xml:/etc/clickhouse-server/config.d/listen-host.xml:ro
      - ./clickhouse-config/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-config/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - app-network
    restart: unless-stopped

  schema-migrator:
    image: signoz/signoz-schema-migrator:0.88.11
    container_name: schema-migrator
    command:
      - "--dsn=tcp://clickhouse:${CLICKHOUSE_PORT:-9000}?username=${CLICKHOUSE_USER:-signoz}&password=${CLICKHOUSE_PASSWORD:-signoz123}"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

  signoz-query-service:
    image: signoz/query-service:0.40.0
    container_name: signoz-query-service
    command: ["-config=/root/config/prometheus.yml"]
    ports:
      - "${SIGNOZ_QUERY_PORT:-8080}:8080"
    environment:
      - ClickHouseUrl=tcp://clickhouse:${CLICKHOUSE_PORT:-9000}?username=${CLICKHOUSE_USER:-signoz}&password=${CLICKHOUSE_PASSWORD:-signoz123}
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone-amd
    volumes:
      - ./signoz-config/prometheus.yml:/root/config/prometheus.yml
      - signoz-data:/var/lib/signoz
    depends_on:
      clickhouse:
        condition: service_healthy
      schema-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.88.11
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC receiver
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OTLP HTTP receiver
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - DOCKER_MULTI_NODE_CLUSTER=false
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    volumes:
      - ./signoz-config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  signoz-frontend:
    image: signoz/frontend:0.40.0
    container_name: signoz-frontend
    ports:
      - "${SIGNOZ_FRONTEND_PORT:-3301}:3301"
    volumes:
      - ./signoz-config/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      signoz-query-service:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  clickhouse-data:
    name: clickhouse-data
  signoz-data:
    name: signoz-data
